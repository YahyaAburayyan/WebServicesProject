<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LRMIS — Surveyor & Analytics Console</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --border: #2e3248;
      --accent: #4f8ef7;
      --accent2: #38d9a9;
      --warn: #ffa94d;
      --danger: #ff6b6b;
      --text: #e8eaf0;
      --muted: #8890aa;
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); letter-spacing: .5px; }
    nav .logo span { color: var(--text); }
    nav .tabs { display: flex; gap: 4px; margin-left: 32px; }
    nav .tab {
      padding: 6px 16px; border-radius: 6px; font-size: .9rem; cursor: pointer;
      border: none; background: transparent; color: var(--muted); transition: all .15s;
    }
    nav .tab:hover { background: var(--card); color: var(--text); }
    nav .tab.active { background: var(--accent); color: #fff; }
    nav .user-badge {
      margin-left: auto; background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px; font-size: .85rem; display: flex;
      align-items: center; gap: 8px;
    }
    nav .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }

    /* ── PAGES ── */
    .page { display: none; padding: 28px 32px; max-width: 1280px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── LOGIN ── */
    #login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 56px);
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 48px; width: 360px; text-align: center;
    }
    .login-box h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .login-box p { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 10px 14px; border-radius: 8px; background: var(--card);
      border: 1px solid var(--border); color: var(--text); font-size: .95rem; margin-bottom: 16px;
    }
    .login-box button {
      width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: .95rem; cursor: pointer; font-weight: 600;
    }
    .login-box button:hover { opacity: .9; }

    /* ── CARDS / GRIDS ── */
    .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
    .subtitle { color: var(--muted); font-size: .9rem; margin-top: -14px; margin-bottom: 20px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media (max-width: 900px) {
      .grid2, .grid3, .grid4 { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px;
    }
    .kpi-card { text-align: center; }
    .kpi-card .val { font-size: 2rem; font-weight: 700; color: var(--accent); margin: 8px 0; }
    .kpi-card .lbl { font-size: .85rem; color: var(--muted); }
